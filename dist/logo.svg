<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#87CEEB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4A90D9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF8C00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E87C24;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Africa continent shape -->
  <path d="M 120 80 C 100 90, 80 120, 85 160 C 90 200, 110 240, 130 280 C 140 310, 150 340, 160 370 C 170 400, 180 420, 200 440 C 220 420, 240 400, 250 370 C 260 340, 270 310, 280 280 C 290 250, 310 220, 315 190 C 320 160, 310 130, 300 110 C 280 90, 250 80, 220 75 C 190 70, 150 70, 120 80 Z" fill="url(#bgGrad)" stroke="#D4A843" stroke-width="4"/>

  <!-- Circuit lines -->
  <path d="M 150 120 L 180 120 L 190 140 L 210 140" fill="none" stroke="white" stroke-width="1.5" opacity="0.4"/>
  <circle cx="190" cy="140" r="3" fill="white" opacity="0.5"/>
  <circle cx="210" cy="140" r="3" fill="white" opacity="0.5"/>

  <!-- Acacia tree -->
  <path d="M 130 200 L 130 250" fill="none" stroke="#2D5016" stroke-width="3"/>
  <ellipse cx="130" cy="195" rx="35" ry="20" fill="#D4A843" opacity="0.9"/>
  <ellipse cx="110" cy="200" rx="20" ry="12" fill="#E8C547" opacity="0.8"/>

  <!-- Open book -->
  <path d="M 160 240 Q 200 225, 240 240 L 240 265 Q 200 250, 160 265 Z" fill="white" stroke="#1E3A5F" stroke-width="2"/>
  <path d="M 200 235 L 200 260" fill="none" stroke="#1E3A5F" stroke-width="1.5"/>

  <!-- Sun -->
  <ellipse cx="200" cy="230" rx="25" ry="15" fill="#FFD700" opacity="0.8"/>

  <!-- Graduation cap -->
  <path d="M 260 180 L 285 170 L 310 180 L 285 190 Z" fill="#1E3A5F"/>
  <path d="M 285 190 L 285 205" fill="none" stroke="#D4A843" stroke-width="2"/>

  <!-- AFRIKA text banner -->
  <rect x="60" y="280" width="280" height="70" rx="10" fill="white" stroke="#D4A843" stroke-width="3"/>
  <text x="200" y="330" font-family="Arial Black, Impact, sans-serif" font-size="52" font-weight="900" text-anchor="middle" fill="url(#textGrad)" stroke="#B8721A" stroke-width="1">AFRIKA</text>

  <!-- School building -->
  <rect x="160" y="380" width="80" height="50" rx="3" fill="#6B8FBD" stroke="white" stroke-width="1.5"/>
  <rect x="175" y="395" width="15" height="20" rx="2" fill="#FFD700" opacity="0.7"/>
  <rect x="195" y="395" width="15" height="20" rx="2" fill="#FFD700" opacity="0.7"/>

  <!-- Road -->
  <path d="M 170 450 Q 200 470, 230 450 L 240 460 Q 200 490, 160 460 Z" fill="#D4A843" opacity="0.6"/>

  <!-- Students -->
  <circle cx="175" cy="360" r="8" fill="#4A3728"/>
  <rect x="168" y="368" width="14" height="20" rx="3" fill="#1E3A5F"/>
  <circle cx="210" cy="362" r="8" fill="#4A3728"/>
  <rect x="203" y="370" width="14" height="18" rx="3" fill="#1E3A5F"/>

  <!-- CREATED 1988 -->
  <text x="200" y="485" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#1E3A5F" letter-spacing="4">CREE EN 1988</text>
  <line x1="130" y1="475" x2="170" y2="475" stroke="#D4A843" stroke-width="2"/>
  <line x1="230" y1="475" x2="270" y2="475" stroke="#D4A843" stroke-width="2"/>
</svg>
